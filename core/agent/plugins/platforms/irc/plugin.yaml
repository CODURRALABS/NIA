name: irc-platform
kind: platform
version: 1.0.0
description: >
  IRC gateway adapter for NIA.
  Connects to an IRC server and relays messages between an IRC channel
  (or DMs) and the NIA.  No external dependencies — uses
  Python's stdlib asyncio for the IRC protocol.
author: Anonymousinsaan & Codurra Labs
requires_env:
  - IRC_SERVER
  - IRC_CHANNEL
  - IRC_NICKNAME
