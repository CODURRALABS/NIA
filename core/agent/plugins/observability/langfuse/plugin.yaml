name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for NIA — traces conversations, LLM calls, and tool usage. Opt-in via `nia plugins enable observability/langfuse` or `nia tools → Langfuse Observability`."
author: NousResearch
requires_env:
  - NIA_LANGFUSE_PUBLIC_KEY
  - NIA_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
